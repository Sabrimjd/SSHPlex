services:
  consul:
    image: hashicorp/consul:1.15
    container_name: sshplex-consul-demo
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -datacenter=dc1
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 3s
      timeout: 2s
      retries: 20

  consul-seed:
    image: curlimages/curl:8.6.0
    container_name: sshplex-consul-seed
    depends_on:
      consul:
        condition: service_healthy
    volumes:
      - ./seed-consul-demo.sh:/seed-consul-demo.sh:ro
    entrypoint: ["sh", "/seed-consul-demo.sh"]
    restart: "no"
