# SSHplex Configuration - tmux support with multiple SoT providers
sshplex:
  session_prefix: "sshplex"

# Source of Truth configuration
sot:
  providers: ["static", "netbox", "ansible", "consul", "git"]  # Available: static, netbox, ansible, consul, git
  import:
    - name: "production-servers"
      type: static
      hosts:
        - name: "web-server-01"
          ip: "192.168.1.10"
          description: "Production web server"
          tags: ["web", "production"]
        - name: "db-server-01"
          ip: "192.168.1.20"
          description: "Primary database server"
          tags: ["database", "production"]
    - name: "test-servers"
      type: static
      hosts:
        - name: "test-web-01"
          ip: "192.168.2.10"
          description: "Test web server"
          tags: ["web", "test"]
    - name: "primary-netbox"
      type: netbox
      url: "https://netbox.lan/"
      token: "CHANGE_TOKEN_HERE"
      verify_ssl: false
      timeout: 30
      default_filters:
        status: "active"
        role: "virtual-machine"
        has_primary_ip: "true"
    - name: "secondary-netbox"
      type: netbox
      url: "https://netbox2.lan/"
      token: "CHANGE_TOKEN_HERE_2"
      verify_ssl: false
      timeout: 30
      default_filters:
        status: "active"
        role: "router"
        has_primary_ip: "true"
    - name: "production-inventory"
      type: ansible
      inventory_paths:
        - "/path/to/production/inventory.yml"
      default_filters:
        groups: ["webservers", "databases"]
        exclude_groups: []
        host_patterns: []
    - name: "staging-inventory"
      type: ansible
      inventory_paths:
        - "/path/to/staging/inventory.yml"
        - "/path/to/staging/additional.yml"
      default_filters:
        groups: []
        exclude_groups: ["maintenance"]
        host_patterns: ["^staging-.*"]
    - name: "consul-nonprod"
      type: consul
      config:
        host: "consul.nonprod.example.com"
        port: 443
        token: "CHANGE_TOKEN_HERE"
        scheme: "https"
        verify: false
        dc: "lisbon"
        cert: ""  # Path to SSL certificate (optional)
    - name: "personal-git-hosts"
      type: git
      repo_url: "git@github.com:your-user/sshplex-hosts.git"
      branch: "main"
      source_pattern: "hosts/**/*.y*ml"
      inventory_format: "static" # static, ansible
      auto_pull: true
      pull_interval_seconds: 300
      priority: 100
      pull_strategy: "ff-only"
    - name: "git-ansible-inventory"
      type: git
      repo_url: "git@github.com:your-org/ansible-inventory.git"
      branch: "main"
      source_pattern: "inventory/**/*.y*ml"
      inventory_format: "ansible"
      default_filters:
        groups: ["webservers", "databases"]
      auto_pull: true
      pull_interval_seconds: 300
      priority: 50
      pull_strategy: "ff-only"

ssh:
  username: "admin"
  key_path: "~/.ssh/id_ed25519"
  timeout: 10
  port: 22
  # SSH security options
  strict_host_key_checking: false  # Set to true for production (more secure)
  # Options: "accept-new" (first connection auto-accepts), "no" (insecure), "yes" (strict)
  user_known_hosts_file: ""  # Empty = default ~/.ssh/known_hosts, or specify custom path
  # Connection retry settings
  retry:
    enabled: true
    max_attempts: 3
    delay_seconds: 2
    exponential_backoff: true  # Double delay on each retry
  proxy:
    - name: "consul-nonprod-proxy"
      imports: ['consul-nonprod']
      host: 10.15.6.9
      username: "admin"
      key_path: "~/.ssh/id_rsa"

tmux:
  backend: "tmux" # tmux, iterm2-native
  iterm2_native_target: "current-window" # current-window, new-window (iterm2-native only)
  iterm2_native_hide_from_history: true # prefix with leading space when dispatching (iterm2-native)
  use_panes: true # true = panes, false = tabs
  layout: "tiled" # tiled, even-horizontal, even-vertical
  broadcast: false # Start with broadcast off
  window_name: "sshplex"
  max_panes_per_window: 5 # Maximum panes per window before creating a new window
  # iTerm2 integration (macOS only)
  control_with_iterm2: false # Use iTerm2 tmux -CC mode (macOS only)
  iterm2_attach_target: "new-window" # Where to open tmux session: new-window, new-tab
  iterm2_profile: "Default" # iTerm2 profile name to use

ui:
  theme: "textual-dark"
  show_log_panel: false
  log_panel_height: 20
  table_columns: ["name", "ip", "cluster", "tags", "description", "provider"]

logging:
  enabled: false
  level: "DEBUG" # DEBUG, INFO, WARNING, ERROR
  file: "logs/sshplex.log"

# Host cache configuration for faster startup
cache:
  enabled: true
  cache_dir: "~/.cache/sshplex"  # Directory to store cached host data
  ttl_hours: 24  # Cache time-to-live in hours (24 = refresh daily)
