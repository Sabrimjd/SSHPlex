name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    #- name: Run tests
    #  run: |
    #    pytest tests/ -v --cov=sshplex --cov-report=xml

    #- name: Upload coverage to Codecov
    #  uses: codecov/codecov-action@v3
    #  with:
    #    file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Extract Release Notes from CHANGELOG.md
      id: changelog
      shell: bash
      run: |
        python - <<'PY'
        import os
        import re
        from pathlib import Path

        changelog_path = Path("CHANGELOG.md")
        if not changelog_path.exists():
            raise SystemExit("CHANGELOG.md not found")

        tag_name = os.environ.get("GITHUB_REF_NAME", "")
        version = tag_name[1:] if tag_name.startswith("v") else tag_name
        if not version:
            raise SystemExit("Unable to resolve release version from GITHUB_REF_NAME")

        changelog = changelog_path.read_text(encoding="utf-8")
        section_start_re = re.compile(rf"^## \\[{re.escape(version)}\\].*$", re.MULTILINE)
        section_start_match = section_start_re.search(changelog)
        if not section_start_match:
            raise SystemExit(f"No changelog section found for version {version}")

        next_section_re = re.compile(r"^## \\[", re.MULTILINE)
        next_section_match = next_section_re.search(changelog, section_start_match.end())
        section_end = next_section_match.start() if next_section_match else len(changelog)

        section_text = changelog[section_start_match.start():section_end].strip() + "\\n"
        notes_path = Path("release-notes.md")
        notes_path.write_text(section_text, encoding="utf-8")

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"body_path={notes_path}\\n")
        PY

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: ${{ steps.changelog.outputs.body_path }}
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  publish:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        pip install twine
        twine upload dist/*
